name: OCR

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ocr:
    name: OCR Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and OCR Tests
        run: ./gradlew :codebase-plugin:test --tests "codebase.ocr.*" --tests "codebase.koog.llm.*"
