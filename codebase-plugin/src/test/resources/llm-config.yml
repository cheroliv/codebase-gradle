# llm-config.yml — LLM providers configuration for codebase-gradle tests
# PATTERN : keyRef/envVar uniquement. Jamais de cle API en dur.
# Ce fichier est dans .gitignore — ne sera jamais commite.
# Les vraies cles vivent dans le shell (~/.bashrc, ~/.zshrc)
# ou dans configuration/settings/gaccount.yml (cercle 1, hors git).

ai:
  ollama:
    baseUrl: "http://localhost:11437"
    model: "gpt-oss:120b-cloud"
  gemini:
    envVar: "GEMINI_API_KEY"
    model: "gemini-1.5-flash"
    baseUrl: "https://generativelanguage.googleapis.com/v1beta"
